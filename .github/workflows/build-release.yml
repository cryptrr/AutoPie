#            prerelease_args+=(--prerelease)
#          fi
#
#          gh release create "$GITHUB_REF_NAME" \
#            "release-output/AutoPie-${GITHUB_REF_NAME}-aarch64.apk" \
#            --verify-tag \
#            --generate-notes \
#            --title "AutoPie $GITHUB_REF_NAME" \
#            "${prerelease_args[@]}"
