name: Build release APK

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build release APK in F-Droid Trixie
    runs-on: ubuntu-latest
    container:
      image: registry.gitlab.com/fdroid/fdroidserver:buildserver-trixie@sha256:dc522fdce601ec80fb1ed420dd0301262a0c7747e8a769c7975629944e8b46c4
    timeout-minutes: 360
    defaults:
      run:
        shell: bash
    env:
      DEBIAN_FRONTEND: noninteractive
      FDROID_BUILD_DIR: /home/vagrant/build/com.autopi
      HOME: /home/vagrant
      LC_ALL: C.UTF-8
      TERMUX_NATIVE_SKIP_HOST_SETUP: "true"
      TERMUX_REF: 401bbe54b8f4e68302b1ff70678015a24628fb1d
      TZ: UTC

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare F-Droid build environment
        run: |
          apt-get update
          apt-get install -y \
            7zip autoconf autoconf-archive autogen automake autopoint \
            bison build-essential clang docbook-xml docbook-xsl doxygen flex \
            gawk gettext gperf groff-base gtk-doc-tools help2man intltool jq \
            libbz2-dev liblzma-dev libncurses-dev libreadline-dev libsqlite3-dev \
            libssl-dev libtool-bin libxml2-utils libzstd-dev lld llvm lz4 lzip \
            lrzip lzop pandoc perl pkg-config po4a python-is-python3 tcl texinfo \
            tk-dev triehash unzip uuid-dev xsltproc xz-utils zip zlib1g-dev zstd

          install -d -o vagrant -g vagrant -m 0755 /home/vagrant/build
          install -d -o vagrant -g vagrant -m 0777 /data/data/com.autopi
          install -d -o vagrant -g vagrant -m 0755 "$FDROID_BUILD_DIR"
          cp -a "$GITHUB_WORKSPACE/." "$FDROID_BUILD_DIR/"
          chown -R vagrant:vagrant "$FDROID_BUILD_DIR"
          chown -R vagrant:vagrant /home/vagrant

      - name: Record build environment
        working-directory: /home/vagrant/build/com.autopi
        run: |
          source /etc/profile.d/bsenv.sh
          printf 'Image: registry.gitlab.com/fdroid/fdroidserver:buildserver-trixie@sha256:dc522fdce601ec80fb1ed420dd0301262a0c7747e8a769c7975629944e8b46c4\n'
          printf 'Build directory: %s\n' "$PWD"
          printf 'Java: '
          sudo -u vagrant -H java -version
          printf 'Debian: '
          cat /etc/debian_version
          printf 'Android home: %s\n' "$ANDROID_HOME"
          dpkg-query -W -f='${Package}=${Version}\n' \
            clang doxygen lld llvm pandoc po4a texinfo | sort

      - name: Build unsigned release APK
        working-directory: /home/vagrant/build/com.autopi
        run: |
          runuser -u vagrant -- env \
            HOME=/home/vagrant \
            LC_ALL=C.UTF-8 \
            TERMUX_NATIVE_SKIP_HOST_SETUP="$TERMUX_NATIVE_SKIP_HOST_SETUP" \
            TERMUX_REF="$TERMUX_REF" \
            TZ=UTC \
            bash -lc '
              set -euo pipefail
              cd /home/vagrant/build/com.autopi
              git config --global user.email fdroid@localhost
              git config --global user.name F-Droid
              printf "%s\n" "org.gradle.jvmargs=-Xmx4g" >> gradle.properties
              bash scripts/fdroid-build-from-source.sh
              ./gradlew :app:assembleRelease
            '

      - name: Decode release keystore
        env:
          AUTOPIE_SIGNING_KEYSTORE_BASE64: ${{ secrets.AUTOPIE_SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [[ -z "$AUTOPIE_SIGNING_KEYSTORE_BASE64" ]]; then
            echo "::error::Missing GitHub Actions secret AUTOPIE_SIGNING_KEYSTORE_BASE64"
            exit 1
          fi
          printf '%s' "$AUTOPIE_SIGNING_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/autopie-release.jks"

      - name: Sign and verify release APK
        working-directory: /home/vagrant/build/com.autopi
        env:
          AUTOPIE_SIGNING_STORE_PASSWORD: ${{ secrets.AUTOPIE_SIGNING_STORE_PASSWORD }}
          AUTOPIE_SIGNING_KEY_ALIAS: ${{ secrets.AUTOPIE_SIGNING_KEY_ALIAS }}
          AUTOPIE_SIGNING_KEY_PASSWORD: ${{ secrets.AUTOPIE_SIGNING_KEY_PASSWORD }}
        run: |
          source /etc/profile.d/bsenv.sh
          for secret_name in AUTOPIE_SIGNING_STORE_PASSWORD AUTOPIE_SIGNING_KEY_ALIAS AUTOPIE_SIGNING_KEY_PASSWORD; do
            if [[ -z "${!secret_name:-}" ]]; then
              echo "::error::Missing GitHub Actions secret $secret_name"
              exit 1
            fi
          done

          APKSIGNER="$ANDROID_HOME/build-tools/34.0.0/apksigner"
          if [[ ! -x "$APKSIGNER" ]]; then
            echo "::error::F-Droid image does not provide $APKSIGNER"
            exit 1
          fi

          "$APKSIGNER" sign \
            --ks "$RUNNER_TEMP/autopie-release.jks" \
            --ks-key-alias "$AUTOPIE_SIGNING_KEY_ALIAS" \
            --ks-pass env:AUTOPIE_SIGNING_STORE_PASSWORD \
            --key-pass env:AUTOPIE_SIGNING_KEY_PASSWORD \
            --out app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

          "$APKSIGNER" verify \
            --verbose \
            --print-certs \
            app/build/outputs/apk/release/app-release.apk

          install -d "$GITHUB_WORKSPACE/release-output"
          cp app/build/outputs/apk/release/app-release.apk \
            "$GITHUB_WORKSPACE/release-output/AutoPie-${GITHUB_REF_NAME}-aarch64.apk"

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: AutoPie-release-${{ github.sha }}
          path: release-output/AutoPie-${{ github.ref_name }}-aarch64.apk
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

