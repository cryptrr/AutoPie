name: Build release APK

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-release:
    name: Build release APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-35" "platforms;android-36" "ndk;29.0.14206865"

      - name: Build release APK
        run: ./build_with_termux.sh :app:assembleRelease

      - name: Upload release APKs
        uses: actions/upload-artifact@v4
        with:
          name: AutoPie-release-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
