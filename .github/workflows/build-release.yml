name: Build release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build release APK
    runs-on: ubuntu-latest
    container:
      image: registry.gitlab.com/fdroid/fdroidserver:buildserver-trixie
    timeout-minutes: 360
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-35" "platforms;android-36" "build-tools;36.0.0" "ndk;29.0.14206865"

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build release APK
        run: |
          ./build_from_source.sh
          ./gradlew :app:assembleRelease

      - name: Decode release keystore
        env:
          AUTOPIE_SIGNING_KEYSTORE_BASE64: ${{ secrets.AUTOPIE_SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [[ -z "$AUTOPIE_SIGNING_KEYSTORE_BASE64" ]]; then
            echo "::error::Missing GitHub Actions secret AUTOPIE_SIGNING_KEYSTORE_BASE64"
            exit 1
          fi
          printf '%s' "$AUTOPIE_SIGNING_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/autopie-release.jks"

      - name: Sign and verify release APK
        env:
          AUTOPIE_SIGNING_STORE_PASSWORD: ${{ secrets.AUTOPIE_SIGNING_STORE_PASSWORD }}
          AUTOPIE_SIGNING_KEY_ALIAS: ${{ secrets.AUTOPIE_SIGNING_KEY_ALIAS }}
          AUTOPIE_SIGNING_KEY_PASSWORD: ${{ secrets.AUTOPIE_SIGNING_KEY_PASSWORD }}
        run: |
          for secret_name in AUTOPIE_SIGNING_STORE_PASSWORD AUTOPIE_SIGNING_KEY_ALIAS AUTOPIE_SIGNING_KEY_PASSWORD; do
            if [[ -z "${!secret_name:-}" ]]; then
              echo "::error::Missing GitHub Actions secret $secret_name"
              exit 1
            fi
          done

          "$ANDROID_HOME/build-tools/36.0.0/apksigner" sign \
            --ks "$RUNNER_TEMP/autopie-release.jks" \
            --ks-key-alias "$AUTOPIE_SIGNING_KEY_ALIAS" \
            --ks-pass env:AUTOPIE_SIGNING_STORE_PASSWORD \
            --key-pass env:AUTOPIE_SIGNING_KEY_PASSWORD \
            --out app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify \
            --verbose \
            --print-certs \
            app/build/outputs/apk/release/app-release.apk

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: AutoPie-release-${{ github.sha }}
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_apk="app/build/outputs/apk/release/AutoPie-${GITHUB_REF_NAME}-aarch64.apk"
          cp app/build/outputs/apk/release/app-release.apk "$release_apk"

          prerelease_args=()
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            prerelease_args+=(--prerelease)
          fi

          gh release create "$GITHUB_REF_NAME" \
            "$release_apk" \
            --verify-tag \
            --generate-notes \
            --title "AutoPie $GITHUB_REF_NAME" \
            "${prerelease_args[@]}"
